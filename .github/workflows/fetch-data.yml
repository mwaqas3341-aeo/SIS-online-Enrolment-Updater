name: Scrape SIS PESRP

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:        # manual trigger

# Prevent overlapping runs: if a run is ever still going when the next
# trigger fires, cancel the stale one instead of letting them collide
# on data/*.json writes.
concurrency:
  group: scrape-sis-pesrp
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python fetch.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m \
            "scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
