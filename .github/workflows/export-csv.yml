name: Export Enrolment CSV

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  export-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build CSV summary
        run: python scripts/export_csv.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/enrolment_summary.csv
          git diff --staged --quiet || git commit -m "Update enrolment_summary.csv [automated]"
          git push